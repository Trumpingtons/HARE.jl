name: Documenter

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for gh-pages deployment
      statuses: write   # allows Documenter to post a commit status
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - uses: julia-actions/cache@v2

      - name: Install docs dependencies
        run: |
          julia --project=docs/ -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'

      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        # Literate.markdown(execute=true) inside make.jl also runs the demo,
        # so a broken example will fail this job.
        run: julia --project=docs/ docs/make.jl
